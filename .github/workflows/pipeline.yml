---
name: Deployment Pipeline

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+
  release:
    types: [ published ]
  workflow_dispatch: { }

env:
  GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError"'
  GRADLE_SWITCHES: '--console=plain --info --stacktrace'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: build and test
        run: ./gradlew ${{ env.GRADLE_SWITCHES }} build

      - name: publish snapshot
        if: github.ref_type == 'branch'
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_TOKEN }}
        run: ./gradlew ${{ env.GRADLE_SWITCHES }} snapshot publishToSonatype

      - name: publish release candidate
        if: github.ref_type == 'tag' && contains(github.ref, '-rc.')
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_TOKEN }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          ./gradlew ${{ env.GRADLE_SWITCHES }} \
            -Preleasing \
            -Prelease.disableGitChecks=true \
            -Prelease.useLastTag=true \
            candidate \
            publish \
            closeAndReleaseSonatypeStagingRepository

      - name: publish release
        if: (github.ref_type == 'tag' && !contains(github.ref, '-rc.')) || (github.event_name == 'release')
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_TOKEN }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          ./gradlew ${{ env.GRADLE_SWITCHES }} \
            -Preleasing \
            -Prelease.disableGitChecks=true \
            -Prelease.useLastTag=true \
            final \
            publish \
            closeAndReleaseSonatypeStagingRepository
